<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гранітні Пам'ятники - Каталог</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">Граніт-Майстер</div>
        <nav>
            <a href="index.html" class="active">Каталог</a>
            <a href="portfolio.html">Портфоліо</a>
        </nav>
        <button id="cart-btn" onclick="toggleCart()">Кошик (<span id="cart-count">0</span>)</button>
    </header>

    <main>
        <h2>Каталог пам'ятників</h2>
        <div id="catalog" class="grid">
            </div>
    </main>

    <div id="cart-modal" class="hidden">
        <div class="cart-content">
            <span class="close" onclick="toggleCart()">&times;</span>
            <h2>Оформлення замовлення</h2>
            <ul id="cart-items"></ul>
            <form id="order-form">
                <input type="text" id="name" placeholder="Ваше ім'я" required>
                <input type="tel" id="phone" placeholder="Ваш телефон (напр. 098...)" required>
                <textarea id="comment" placeholder="Коментар до замовлення"></textarea>
                <button type="submit" class="submit-btn">Відправити замовлення</button>
            </form>
        </div>
    </div>
    <div id="overlay" class="hidden" onclick="toggleCart()"></div>

    <script src="js/script.js"></script>
</body>
</html>
